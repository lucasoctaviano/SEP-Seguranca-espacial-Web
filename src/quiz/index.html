<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <h1>DESAFIO OPEN ORBIT</h1>
        <p>Responda as questões abaixo e clique em "Finalizar" para recber seu resultado</p>

        <form id="quiz-formes" class="quiz-formes">
            <div class="quiz-pergunta">
                <label>1. Qual o principal problema que a Open Orbit pretende resolver?</label>
                <input type="text" class="resposta" placeholder="Escreva aqui">
            </div>
            <div class="quiz-pergunta">
                <label>2. Quais são os benefícios de usar dados de segurança orbital em código aberto?</label>
                <input type="text" class="resposta" placeholder="Escreva aqui">
            </div>
            <div class="quiz-pergunta">
                <label>3. Como a Open Orbit pode contribuir para a segurança de satélites críticos?</label>
                <input type="text" class="resposta" placeholder="Escreva aqui">
            </div>
            <div class="quiz-pergunta">
                <label>4. Cite uma das três principais funcionalidades da Open Orbit.</label>
                <input type="text" class="resposta" placeholder="Escreva aqui">
            </div>
            <div class="quiz-pergunta">
                <label>5. Cite um dos três principais objetivos da Open Orbit.</label>
                <input type="text" class="resposta" placeholder="Escreva aqui">
            </div>
            <button type="submit" class="botao-quiz">Finalizar Quiz</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
